<style>:root {

  .orb3 { width: 150px; height: 150px; background: var(--rose-light); top: 40%; left: 70%; animation-delay: 1.5s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  .hero-logo {
    position: relative;

  }

  @keyframes heartbeat {
    0%   { transform: scale(1); }
    14%  { transform: scale(1.25); }
    28%  { transform: scale(1); }
    42%  { transform: scale(1.18); }
    56%  { transform: scale(1); }

  .hero h1 {
    position: relative; z-index: 2;

    font-size: clamp(2.8rem, 8vw, 5.5rem);
    font-weight: 900;
    color: #fff;

    margin-bottom: 24px;

  .cta-btn {

    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 1.05rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 18px 52px;
    border-radius: 60px;
    box-shadow: 0 8px 40px rgba(232,41,74,0.5);
    transition: transform 0.25s, box-shadow 0.25s, filter 0.25s;
    animation: fadeDown 1.1s 0.3s ease both, glowPulse 2s 1.5s ease-in-out infinite;
    overflow: hidden;
  }

  /* Capa de brillo sweeping */
  .cta-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
      120deg,
      transparent 0%,
      rgba(255,255,255,0.15) 40%,
      rgba(255,255,255,0.45) 50%,
      rgba(255,255,255,0.15) 60%,
      transparent 100%
    );
    transform: skewX(-20deg);
    pointer-events: none;
    animation: sweepShine 3s 2s ease-in-out infinite;
  }

  @keyframes sweepShine {
    0%   { left: -100%; }
    40%  { left: 160%; }
    100% { left: 160%; }
  }

  .cta-btn:hover::before {
    animation: sweepShineHover 0.55s ease forwards;
  }

  @keyframes sweepShineHover {
    0%   { left: -100%; }
    100% { left: 160%; }
  }

  .cta-btn:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow:
      0 0 0 3px rgba(232,41,74,0.3),
      0 0 20px 4px rgba(232,41,74,0.55),
      0 0 50px 10px rgba(232,41,74,0.35),
      0 14px 50px rgba(232,41,74,0.65);
    filter: brightness(1.12);
  }

  .cta-btn:active {
    transform: translateY(0px) scale(0.97);
    box-shadow:
      0 0 0 5px rgba(232,41,74,0.5),
      0 0 30px 8px rgba(232,41,74,0.7),
      0 4px 20px rgba(232,41,74,0.5);
    filter: brightness(1.25);
    animation: none;
  }

  @keyframes glowPulse {
    0%, 100% {
      box-shadow:
        0 0 0 3px rgba(232,41,74,0.3),
        0 0 20px 4px rgba(232,41,74,0.55),
        0 0 50px 10px rgba(232,41,74,0.35),
        0 14px 50px rgba(232,41,74,0.65);
    }
    50% {
      box-shadow:
        0 0 0 5px rgba(232,41,74,0.45),
        0 0 30px 10px rgba(255,107,133,0.65),
        0 0 70px 18px rgba(232,41,74,0.4),
        0 18px 60px rgba(232,41,74,0.75);

    animation: scrollLine 2s ease-in-out infinite;
  }
  @keyframes scrollLine {
    0% { transform: scaleY(0); transform-origin: top; }
    50% { transform: scaleY(1); transform-origin: top; }
    51% { transform: scaleY(1); transform-origin: bottom; }
    100% { transform: scaleY(0); transform-origin: bottom; }
